services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: waterinfohub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: waterinfohub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: waterinfohub-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/waterinfohub
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    command: ["uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: waterinfohub-worker
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/waterinfohub
    depends_on:
      - postgres
    command: ["python", "-m", "apps.worker.main"]

volumes:
  postgres_data:
