services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: waterinfohub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-waterinfohub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-waterinfohub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: waterinfohub-migrate
    profiles: ["ops"]
    env_file:
      - ../../.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:change-me@postgres:5432/waterinfohub}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: waterinfohub-api
    restart: unless-stopped
    env_file:
      - ../../.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:change-me@postgres:5432/waterinfohub}
    volumes:
      - ../../data/reports:/app/data/reports
      - ../../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: waterinfohub-worker
    restart: unless-stopped
    env_file:
      - ../../.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:change-me@postgres:5432/waterinfohub}
    volumes:
      - ../../data/reports:/app/data/reports
      - ../../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "apps.worker.main", "--scheduler"]

volumes:
  postgres_data:
